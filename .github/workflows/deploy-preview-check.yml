name: Deploy Preview Check

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  preview-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build (Render preview mode)
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-preview
          path: dist
